name: backend

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    branches: [main, master]
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci_migrations.db
      CLERK_JWT_PUBLIC_KEY: test-clerk-public-key
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Format check
        run: python -m black --check .

      - name: Lint
        run: python -m ruff check app tests migrations

      - name: Type check
        run: python -m mypy app

      - name: Migration smoke
        run: |
          python -m alembic upgrade head
          python -m alembic current

      - name: Test (in-memory SQLite — no Postgres needed)
        run: python -m pytest -v
